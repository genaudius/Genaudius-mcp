# ═══════════════════════════════════════════════════════════════════
# Nginx — genaudius.app
# Rutas:
#   genaudius.app          → landing / docs del MCP
#   api.genaudius.app      → API Gateway del MCP (para que llame el SaaS)
#   api.genaudius.app/mcp  → MCP Server HTTP endpoint
# ═══════════════════════════════════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=30r/m;
limit_req_zone $binary_remote_addr zone=health_limit:1m  rate=60r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────
server {
    listen 80;
    server_name genaudius.app www.genaudius.app api.genaudius.app;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── genaudius.app (landing / docs) ───────────────────────────────
server {
    listen 443 ssl http2;
    server_name genaudius.app www.genaudius.app;

    ssl_certificate     /etc/letsencrypt/live/genaudius.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/genaudius.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            DENY always;
    add_header X-Content-Type-Options     nosniff always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

    # CORS — solo permite llamadas desde genaudius.com y genaudius.studio
    add_header Access-Control-Allow-Origin  "https://genaudius.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-GenAudius-Key" always;

    location / {
        return 200 '{"name":"GenAudius MCP","version":"1.0.0","docs":"https://genaudius.app/docs","status":"ok"}';
        add_header Content-Type application/json;
    }

    location /docs {
        proxy_pass         http://mcp_server:8000/docs;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        limit_req zone=health_limit burst=10 nodelay;
        proxy_pass http://mcp_server:8000/health;
        proxy_set_header Host $host;
    }
}

# ── api.genaudius.app (Gateway → SaaS en genaudius.com) ──────────
server {
    listen 443 ssl http2;
    server_name api.genaudius.app;

    ssl_certificate     /etc/letsencrypt/live/genaudius.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/genaudius.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            DENY always;
    add_header X-Content-Type-Options     nosniff always;

    # CORS — solo desde genaudius.com y genaudius.studio
    set $cors_origin "";
    if ($http_origin = "https://genaudius.com") {
        set $cors_origin "https://genaudius.com";
    }
    if ($http_origin = "https://genaudius.studio") {
        set $cors_origin "https://genaudius.studio";
    }
    add_header Access-Control-Allow-Origin  $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-GenAudius-Key" always;
    add_header Access-Control-Max-Age       3600 always;

    # Preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Rate limiting general
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;

    # Bloquear IPs no autorizadas (añadir IPs de AWS aquí)
    # allow 1.2.3.4;      # IP elástica de AWS
    # deny all;           # descomentar cuando tengas las IPs de AWS

    # ── /v1/* → Modal Gateway en genaudius.studio ────────────────
    location /v1/ {
        proxy_pass          ${MODAL_GATEWAY_URL}/v1/;
        proxy_http_version  1.1;
        proxy_set_header    Host                  genaudius.studio;
        proxy_set_header    X-Real-IP             $remote_addr;
        proxy_set_header    X-Forwarded-For       $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto     $scheme;
        proxy_set_header    X-Origin-Domain       genaudius.app;
        proxy_read_timeout  660s;
        proxy_send_timeout  660s;
        proxy_buffering     off;

        # Streaming support (para /chat/stream)
        proxy_set_header    Connection            "";
        chunked_transfer_encoding on;
    }

    # ── /mcp/* → MCP Server local ────────────────────────────────
    location /mcp/ {
        proxy_pass          http://mcp_server:8000/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  660s;
        proxy_send_timeout  660s;
        proxy_buffering     off;
    }

    location /health {
        limit_req zone=health_limit burst=5 nodelay;
        proxy_pass http://mcp_server:8000/health;
        proxy_set_header Host $host;
    }

    # Bloquear todo lo demás
    location / {
        return 404 '{"error":"Not found","docs":"https://genaudius.app/docs"}';
        add_header Content-Type application/json;
    }
}
